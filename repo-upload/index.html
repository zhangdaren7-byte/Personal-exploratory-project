<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Exploratory Projects</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #10141f;
        color: #f7edd0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #10141f;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(32px, 7vw, 64px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 660px;
        margin: 0 0 32px;
        color: #a9b5bf;
        font-size: 18px;
        line-height: 1.65;
      }

      a {
        display: grid;
        gap: 8px;
        max-width: 520px;
        padding: 18px 20px;
        border: 1px solid rgba(255, 240, 194, 0.18);
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
        background: #151e31;
        box-shadow: 0 10px 0 rgba(0, 0, 0, 0.24);
      }

      a:hover,
      a:focus-visible {
        border-color: #ffd05f;
        outline: none;
      }

      b {
        color: #ffd05f;
        font-size: 22px;
      }

      span {
        color: #a8f3ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Personal Exploratory Projects</h1>
      <p>这里收纳不同方向的小实验和原型。每个项目都有独立目录，后续新增项目不会互相影响。</p>
      <a href="projects/chao-yuan-mvp/">
        <b>潮渊 MVP</b>
        <span>陆地与海底互相驱动的像素冒险原型</span>
      </a>
    </main>
  </body>
</html>
